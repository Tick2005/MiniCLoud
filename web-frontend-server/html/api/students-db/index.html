<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danh sach sinh vien (MariaDB)</title>
  <style>
    body { margin:0; font-family:"Segoe UI",Tahoma,sans-serif; background:#eef7ef; color:#153025; }
    .wrap { max-width:1150px; margin:24px auto; padding:0 14px; }
    .panel { background:#fff; border:1px solid #d8eadb; border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:0 10px 22px rgba(21,48,37,.08); }
    h1, h2 { margin:0 0 10px; }
    h1 { color:#0e8d3a; }
    .sub { color:#4c6a56; margin:0 0 10px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    input, button { padding:9px; border:1px solid #cde1d0; border-radius:8px; font-size:14px; }
    button { border:0; background:#148f40; color:#fff; font-weight:700; cursor:pointer; }
    button.secondary { background:#4f6f58; }
    button.danger { background:#b72a3e; }
    form { display:grid; grid-template-columns: repeat(2, minmax(220px, 1fr)); gap:8px; }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding:9px 7px; border-bottom:1px solid #e6efe7; }
    th { background:#13a13f; color:#fff; }
    .center { text-align:center; }
    .status { font-weight:700; }
    .ok { color:#1c7c31; }
    .err { color:#b02035; }
    @media (max-width: 860px) { form { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>Danh sach sinh vien (MariaDB)</h1>
      <p class="sub">Cau 3: CRUD + ket noi Flask-App voi CSDL studentdb.</p>
      <p class="sub">URL bat buoc: /api/students-db</p>
      <p id="status" class="status"></p>
    </section>

    <section class="panel">
      <h2>Search (Select)</h2>
      <div class="row">
        <input id="q" placeholder="Nhap ma SV / ten / nganh" />
        <button type="button" class="secondary" onclick="searchRows()">Search</button>
        <button type="button" class="secondary" onclick="loadRows()">Reset</button>
      </div>
    </section>

    <section class="panel">
      <h2>Add / Update</h2>
      <form id="studentForm">
        <input type="hidden" id="pk" />
        <input id="student_id" placeholder="student_id (VD: SV100)" required />
        <input id="fullname" placeholder="fullname" required />
        <input id="dob" title="dob" type="date" required />
        <input id="major" placeholder="major" required />
        <div class="row">
          <button type="submit">Save (Add/Update)</button>
          <button type="button" class="secondary" onclick="editFromSelected()">Edit Selected</button>
          <button type="button" class="secondary" onclick="clearForm()">Clear</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>Insert by File</h2>
      <div class="row">
        <input id="importFile" title="import-file" type="file" accept=".csv,.xls,.xlsx" />
        <button type="button" onclick="importFile()">Import File</button>
      </div>
    </section>

    <section class="panel">
      <h2>Delete</h2>
      <div class="row">
        <button type="button" class="danger" onclick="deleteSelected()">Delete Selected</button>
      </div>
      <p class="sub">Delete 1 hoac nhieu ban ghi deu dung checkbox trong bang du lieu.</p>
    </section>

    <section class="panel">
      <h2>Bang Du Lieu</h2>
      <table>
        <thead>
          <tr>
            <th class="center"><input id="checkAll" title="check-all" type="checkbox" /></th>
            <th>#</th>
            <th>Student ID</th>
            <th>Fullname</th>
            <th>DOB</th>
            <th>Major</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </div>

  <script>
    const endpoint = '/api/data/students-db';

    function setStatus(msg, ok = true) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + (ok ? 'ok' : 'err');
    }

    function clearForm() {
      document.getElementById('pk').value = '';
      document.getElementById('student_id').value = '';
      document.getElementById('fullname').value = '';
      document.getElementById('dob').value = '';
      document.getElementById('major').value = '';
    }

    function fmtDate(v) {
      return (v || '').toString().slice(0, 10);
    }

    function selectedIds() {
      return Array.from(document.querySelectorAll('.rowCheck:checked')).map(x => Number(x.value));
    }

    function rowTemplate(r) {
      return `
        <tr>
          <td class="center"><input type="checkbox" class="rowCheck" value="${r.id}" /></td>
          <td>${r.id}</td>
          <td>${r.student_id}</td>
          <td>${r.fullname}</td>
          <td>${fmtDate(r.dob)}</td>
          <td>${r.major}</td>
        </tr>
      `;
    }

    async function loadRows() {
      const res = await fetch(endpoint);
      const rows = await res.json();
      document.getElementById('rows').innerHTML = rows.map(rowTemplate).join('');
      document.getElementById('checkAll').checked = false;
      setStatus(`Da tai ${rows.length} ban ghi`, true);
    }

    async function searchRows() {
      const q = document.getElementById('q').value.trim();
      const res = await fetch(`${endpoint}?q=${encodeURIComponent(q)}`);
      const rows = await res.json();
      document.getElementById('rows').innerHTML = rows.map(rowTemplate).join('');
      document.getElementById('checkAll').checked = false;
      setStatus(`Search tim thay ${rows.length} ban ghi`, true);
    }

    async function editFromSelected() {
      const ids = selectedIds();
      if (ids.length !== 1) {
        setStatus('Hay chon dung 1 ban ghi de edit', false);
        return;
      }

      const res = await fetch(`${endpoint}/${ids[0]}`);
      if (!res.ok) {
        setStatus('Khong tim thay ban ghi', false);
        return;
      }
      const r = await res.json();
      document.getElementById('pk').value = r.id;
      document.getElementById('student_id').value = r.student_id;
      document.getElementById('fullname').value = r.fullname;
      document.getElementById('dob').value = fmtDate(r.dob);
      document.getElementById('major').value = r.major;
      setStatus(`Dang edit ID ${r.id}`, true);
    }

    async function deleteSelected() {
      const ids = selectedIds();
      if (ids.length === 0) {
        setStatus('Hay chon it nhat 1 dong de delete', false);
        return;
      }

      const allChecked = document.getElementById('checkAll').checked;
      const payload = allChecked ? { delete_all: true } : { ids };
      const res = await fetch(endpoint, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        setStatus(data.error || 'Delete that bai', false);
        return;
      }
      await loadRows();
      setStatus(`Delete thanh cong: ${data.deleted} ban ghi`, true);
    }

    document.getElementById('studentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('pk').value;
      const payload = {
        student_id: document.getElementById('student_id').value.trim(),
        fullname: document.getElementById('fullname').value.trim(),
        dob: document.getElementById('dob').value,
        major: document.getElementById('major').value.trim()
      };

      const url = id ? `${endpoint}/${id}` : endpoint;
      const method = id ? 'PUT' : 'POST';

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        setStatus(data.error || 'Save that bai', false);
        return;
      }
      clearForm();
      await loadRows();
      setStatus(id ? 'Update thanh cong' : 'Add thanh cong', true);
    });

    async function importFile() {
      const file = document.getElementById('importFile').files[0];
      if (!file) {
        setStatus('Hay chon file truoc khi import', false);
        return;
      }
      const fd = new FormData();
      fd.append('file', file);

      const res = await fetch(`${endpoint}/import`, { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) {
        setStatus(data.error || 'Import that bai', false);
        return;
      }
      await loadRows();
      setStatus(`Import xong: inserted=${data.inserted}, duplicates=${data.duplicates}, skipped=${data.skipped}`, true);
    }

    document.getElementById('checkAll').addEventListener('change', (e) => {
      document.querySelectorAll('.rowCheck').forEach(chk => {
        chk.checked = e.target.checked;
      });
    });

    loadRows();
  </script>
</body>
</html>
