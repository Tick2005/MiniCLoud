events {}
http {
  upstream web_cluster {
    server web-frontend-server:80;
    server web-frontend-server2:80;
  }
  server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # UI routes under /api/*
    location = /api/student {
      set $backend_upstream http://application-backend-server:8081;
      proxy_set_header X-Render-Mode html;
      proxy_pass $backend_upstream/student;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/students-db {
      set $backend_upstream http://application-backend-server:8081;
      proxy_set_header X-Render-Mode html;
      proxy_pass $backend_upstream/students-db;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /student/ {
      proxy_pass http://application-backend-server:8081/student;
    }

    # Web static
    location / {
      proxy_pass http://web_cluster;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Compatibility: expose Keycloak on /api/auth as well.
    location = /api/auth {
      set $auth_upstream http://authentication-identity-server:8080;
      proxy_pass $auth_upstream/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
      set $auth_upstream http://authentication-identity-server:8080;
      proxy_pass $auth_upstream/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # App API (strip /api/)
    location /api/ {
      set $backend_upstream http://application-backend-server:8081;
      proxy_pass $backend_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keycloak
    location /auth/ {
      set $auth_upstream http://authentication-identity-server:8080;
      proxy_pass $auth_upstream/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
