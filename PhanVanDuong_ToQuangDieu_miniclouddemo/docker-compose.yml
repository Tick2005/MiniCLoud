networks:
  cloud-net:
    name: cloud-net

services:
  web-frontend-server:
    build: ./web-frontend-server
    image: phanvanduong_toquangdieu/web:dev
    container_name: web-frontend-server
    networks:
      cloud-net:
        aliases:
          - web-frontend-server.cloud.local
    ports: [ "8080:80" ]
    restart: unless-stopped

  web-frontend-server2:
    build: ./web-frontend-server2
    image: hotensv/web2:dev
    container_name: web-frontend-server2
    networks:
      - cloud-net
    restart: unless-stopped

  application-backend-server:
    build: ./application-backend-server
    image: phanvanduong_toquangdieu/app:dev
    container_name: application-backend-server
    networks:
      cloud-net:
        aliases:
          - app-backend.cloud.local
    ports: [ "8085:8081" ]
    restart: unless-stopped
    environment:
      OIDC_ISSUER: "${OIDC_ISSUER:-http://authentication-identity-server:8080/auth/realms/realm_sv001}"
      OIDC_AUDIENCE: "account"

  relational-database-server:
    image: mariadb:11
    container_name: relational-database-server
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: minicloud
    volumes:
      - ./relational-database-server/init:/docker-entrypoint-initdb.d:ro
    ports: [ "3306:3306" ]
    restart: unless-stopped
    networks:
      cloud-net:
        aliases:
          - relational-database-server.cloud.local

  authentication-identity-server:
    image: quay.io/keycloak/keycloak:latest
    container_name: authentication-identity-server
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: "${KC_HOSTNAME:-localhost}"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: "/auth"
      KC_PROXY_HEADERS: "xforwarded"
    volumes:
      - ./authentication-identity-server/data:/opt/keycloak/data
    ports: [ "8081:8080" ]
    restart: unless-stopped
    networks:
      cloud-net:
        aliases:
          - keycloak.cloud.local

  object-storage-server:
    image: minio/minio
    container_name: object-storage-server
    command: ["server","/data","--console-address",":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./object-storage-server/data:/data
    ports: [ "9000:9000", "9001:9001" ]
    restart: unless-stopped
    networks:
      cloud-net:
        aliases:
          - minio.cloud.local

  internal-dns-server:
    image: internetsystemsconsortium/bind9:9.18
    container_name: internal-dns-server
    ports: [ "53:53/tcp", "53:53/udp", "1053:53/tcp", "1053:53/udp" ]
    restart: unless-stopped
    volumes:
      - ./internal-dns-server/named.conf:/etc/bind/named.conf:ro
      - ./internal-dns-server/named.conf.options:/etc/bind/named.conf.options:ro
      - ./internal-dns-server/named.conf.local:/etc/bind/named.conf.local:ro
      - ./internal-dns-server/db.cloud.local:/etc/bind/db.cloud.local:ro
    networks:
      cloud-net:
        aliases:
          - internal-dns-server.cloud.local

  monitoring-node-exporter-server:
    image: prom/node-exporter:latest
    container_name: monitoring-node-exporter-server
    ports: [ "9100:9100" ]
    restart: unless-stopped
    networks:
      cloud-net:
        aliases:
          - monitoring-node-exporter-server.cloud.local

  monitoring-prometheus-server:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus-server
    ports: [ "9090:9090" ]
    restart: unless-stopped
    volumes:
      - ./monitoring-prometheus-server/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      cloud-net:
        aliases:
          - monitoring-prometheus-server.cloud.local

  monitoring-grafana-dashboard-server:
    image: grafana/grafana:latest
    container_name: monitoring-grafana-dashboard-server
    ports: [ "3000:3000" ]
    restart: unless-stopped
    volumes:
      - ./monitoring-grafana-dashboard-server/data:/var/lib/grafana
    networks:
      cloud-net:
        aliases:
          - monitoring-grafana-dashboard-server.cloud.local

  api-gateway-proxy-server:
    image: nginx:stable
    container_name: api-gateway-proxy-server
    depends_on:
      - web-frontend-server
      - application-backend-server
      - authentication-identity-server
    ports: [ "80:80" ]
    volumes:
      - ./api-gateway-proxy-server/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      cloud-net:
        aliases:
          - api-gateway-proxy-server.cloud.local
    restart: unless-stopped
