<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Learning Loop Illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2158"/>
      <stop offset="100%" stop-color="#384fbe"/>
    </linearGradient>
    <linearGradient id="loop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd78a"/>
      <stop offset="100%" stop-color="#ffb766"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="140" y="120" width="920" height="390" rx="26" fill="#f7f6ff" opacity="0.95"/>
  <text x="600" y="195" text-anchor="middle" font-size="40" font-family="Segoe UI, Arial" fill="#2e2a64" font-weight="700">Learning Loop That Sticks</text>
  <g stroke="url(#loop)" stroke-width="16" fill="none" stroke-linecap="round">
    <path d="M300 310 C300 250 900 250 900 310"/>
    <path d="M900 310 C900 370 300 370 300 430"/>
    <path d="M300 430 C300 490 900 490 900 430"/>
  </g>
  <g fill="#2e2a64" font-family="Segoe UI, Arial" font-size="24" font-weight="700">
    <text x="300" y="300">Capture</text>
    <text x="600" y="360" text-anchor="middle">Build</text>
    <text x="900" y="420" text-anchor="end">Explain</text>
    <text x="600" y="475" text-anchor="middle">Retrieve</text>
  </g>
  <text x="600" y="560" text-anchor="middle" font-size="24" font-family="Segoe UI, Arial" fill="#edf0ff">Output artifacts every cycle to lock in knowledge</text>
</svg>
